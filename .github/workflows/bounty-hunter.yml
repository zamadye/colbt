name: Bounty Hunter

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Setup Git
        run: |
          git config --global user.name "Kahfi Elhady"
          git config --global user.email "kahfie@gmail.com"
      
      - name: Setup OpenClaw Environment
        run: |
          ./setup-openclaw.sh
      
      - name: Install OpenClaw
        run: |
          npm install -g openclaw@latest --force --unsafe-perm
          openclaw --version
      
      - name: Verify OpenClaw Setup
        run: |
          echo "Config:"
          cat ~/.openclaw/openclaw.json
          echo "Skills:"
          ls ~/.openclaw/workspace/skills/
          echo "Identity:"
          cat ~/.openclaw/workspace/IDENTITY.md | head -5
      
      - name: Run REAL Bounty Hunt
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "🎯 Starting REAL bounty hunt with proper OpenClaw setup..."
          
          # Run OpenClaw agent with EXACT same setup as localhost
          timeout 600 openclaw agent --session-id "gh-hunt-$(date +%s)" --message "REAL BOUNTY HUNT - EXACT LOCALHOST SETUP

          CRITICAL: HUMAN IDENTITY (read IDENTITY.md)
          - Git: Kahfi Elhady <kahfie@gmail.com>
          - Commits: casual, lowercase (\"fix typo\", \"oops missed this\")
          - PR: conversational (\"hey i fixed this\", \"let me know if changes needed\")
          - NO \"copilot\", NO formal tone, NO perfect grammar
          - Wait 15-20 min before submitting PR
          - Multiple commits (not 1 perfect commit)

          WORKFLOW (SAME AS PR #136):
          1. Algora: curl https://console.algora.io/api/bounties.json
          2. GitHub: is:issue is:open label:\"good first issue\" created:>2026-03-01
          3. Pick 1 simple issue (typo/import/lint)
          4. Clone repo
          5. Wait 15 min (simulate human reading)
          6. Make fix with human-like commits
          7. PR with casual description
          8. Token: $GITHUB_TOKEN

          Keep it natural, not AI-perfect. EXACT SAME AS LOCALHOST SUCCESS!"
