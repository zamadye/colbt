name: Bounty Hunter

on:
  schedule:
    - cron: '*/20 * * * *'  # Every 20 minutes
  workflow_dispatch:  # Manual trigger

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Run Bounty Hunt (API Only)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "🎯 Starting bounty hunt..."
          
          # Search Algora bounties
          echo "Searching Algora..."
          curl -s https://console.algora.io/api/bounties.json | jq '.[] | select(.status=="open")' || echo "No Algora bounties"
          
          # Search GitHub issues
          echo "Searching GitHub..."
          curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/search/issues?q=is:issue+is:open+label:\"good first issue\"+created:>2026-03-01" \
            | jq '.items[0:3] | .[] | {title, html_url, labels: [.labels[].name]}' || echo "No GitHub issues"
          
          echo "✅ Hunt completed (API mode)"
