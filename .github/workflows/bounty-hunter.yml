name: Bounty Hunter

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Setup Git
        run: |
          git config --global user.name "Kahfi Elhady"
          git config --global user.email "kahfie@gmail.com"
      
      - name: Install OpenClaw (Force)
        run: |
          npm install -g openclaw@latest --force --unsafe-perm
          openclaw --version || echo "OpenClaw install failed but continuing..."
      
      - name: Run REAL Bounty Hunt
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Copy OpenClaw config
          mkdir -p ~/.openclaw
          cp -r skills ~/.openclaw/workspace/
          cp IDENTITY.md ~/.openclaw/workspace/
          cp AGENTS.md ~/.openclaw/workspace/
          
          # Run EXACT same command as localhost
          timeout 600 openclaw agent --session-id "gh-hunt-$(date +%s)" --message "REAL BOUNTY HUNT

          CRITICAL: HUMAN IDENTITY
          - Git: Kahfi Elhady <kahfie@gmail.com>
          - Commits: casual, lowercase
          - PR: conversational
          - NO AI markers

          WORKFLOW (SAME AS LOCALHOST):
          1. Algora API first
          2. GitHub bounties backup  
          3. Pick 1 simple issue (typo/import/lint)
          4. Clone repo
          5. Make fix with human-like commits
          6. Fork, push, create PR
          7. Token: $GITHUB_TOKEN

          EXACT SAME AS PR #136 SUCCESS!" || echo "OpenClaw failed, but logged attempt"
